name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Lint docker-compose.yml
      run: |
        cd day1_docker
        docker compose config
      
    - name: Build app image
      run: |
        cd day1_docker/app
        docker build -t test-app .
      
    - name: Start all services
      run: |
        cd day1_docker
        docker compose up -d
      
    - name: Wait for services
      run: sleep 10
      
    - name: List running containers
      run: docker ps
      
    - name: Test web endpoint
      run: |
        curl --fail http://localhost:8080
      
    - name: Find web container and test database
      run: |
        CONTAINER=$(docker ps --format '{{.Names}}' | grep -E 'day1_docker.*web' | head -1)
        echo "Found container: $CONTAINER"
        docker exec $CONTAINER sh -c "apk add --no-cache postgresql-client && pg_isready -U devops_user -h database"
      
    - name: Show logs if failed
      if: failure()
      run: |
        cd day1_docker
        docker compose logs
